<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Favourites — AI Art & Creative Tools Pals</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,400;0,9..144,700;0,9..144,900;1,9..144,700&family=DM+Sans:ital,wght@0,300;0,400;0,500;1,300&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="./css/app.css">
    <link rel="stylesheet" href="./css/favourites.css">
</head>
<body>

    <header class="nav">
        <div class="nav-inner">
            <a class="nav-brand" href="/index.html">
                <span class="brand-dot"></span>
                AI Art &amp; Creative Tools Pals
            </a>
            <div class="nav-right">
                <a href="/index.html" class="nav-link">Feed</a>
                <a href="/favourites.html" class="nav-link nav-link-active">❤ Favourites</a>
                <a href="/profile.html" class="nav-user" id="nav-user-info">
                    <img class="nav-avatar" id="nav-avatar" src="" alt="">
                    <span id="nav-username"></span>
                    <span class="nav-points" id="nav-points"></span>
                </a>
                <button class="nav-btn-logout" id="logout-btn">Sign out</button>
            </div>
        </div>
    </header>

    <div class="fav-hero">
        <div class="fav-hero-inner">
            <h1 class="fav-title">My <span>Favourites</span></h1>
            <p class="fav-sub">Links you've given a 👍 — your personal collection.</p>
        </div>
    </div>

    <main class="feed-wrap">
        <div class="feed-header">
            <div class="feed-header-left">
                <div id="feed-count" class="feed-count"></div>
            </div>
        </div>
        <div class="posts-grid" id="posts-grid">
            <div class="loading-state">
                <div class="spinner-lg"></div>
                <p>Loading your favourites…</p>
            </div>
        </div>
    </main>

    <script src="./js/favourites.js"></script>
</body>
</html>
