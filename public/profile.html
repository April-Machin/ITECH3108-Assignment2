<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Profile — AI Art & Creative Tools Pals</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,400;0,9..144,700;0,9..144,900;1,9..144,700&family=DM+Sans:ital,wght@0,300;0,400;0,500;1,300&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="./css/app.css">
    <link rel="stylesheet" href="./css/profile.css">
</head>
<body>

    <header class="nav">
        <div class="nav-inner">
            <a class="nav-brand" href="/index.html">
                <span class="brand-dot"></span>
                AI Art &amp; Creative Tools Pals
            </a>
            <div class="nav-right">
                <a href="/index.html" class="nav-link">Feed</a>
                <a href="/favourites.html" class="nav-link auth-only hidden">❤ Favourites</a>

                <a href="/profile.html" class="nav-user auth-only hidden" id="nav-user-info">
                    <img class="nav-avatar" id="nav-avatar" src="" alt="">
                    <span id="nav-username"></span>
                    <span class="nav-points" id="nav-points"></span>
                </a>

                <a href="/login.html" class="nav-btn-login guest-only">Sign in</a>
                <button class="nav-btn-logout auth-only hidden" id="logout-btn">Sign out</button>
            </div>
        </div>
    </header>

    <div class="profile-hero">
        <div class="profile-hero-inner">
            <div class="profile-avatar-wrap">
                <img class="profile-avatar" id="profile-avatar" src="" alt="">
                <div class="profile-avatar-ring"></div>
            </div>
            <div class="profile-info">
                <h1 class="profile-username" id="profile-username">—</h1>
                <p class="profile-email" id="profile-email"></p>
                <p class="profile-bio" id="profile-bio"></p>
                <div class="profile-stats">
                    <div class="pstat">
                        <span class="pstat-num" id="stat-points">—</span>
                        <span class="pstat-label">Tech Points</span>
                    </div>
                    <div class="pstat-divider"></div>
                    <div class="pstat">
                        <span class="pstat-num" id="stat-posts">—</span>
                        <span class="pstat-label">Links Shared</span>
                    </div>
                    <div class="pstat-divider"></div>
                    <div class="pstat">
                        <span class="pstat-num" id="stat-likes">—</span>
                        <span class="pstat-label">Likes Received</span>
                    </div>
                    <div class="pstat-divider"></div>
                    <div class="pstat">
                        <span class="pstat-num" id="stat-joined">—</span>
                        <span class="pstat-label">Joined</span>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <main class="feed-wrap">
        <div class="feed-header">
            <div class="feed-header-left">
                <h2 class="section-title" id="section-title">Links</h2>
                <div id="feed-count" class="feed-count"></div>
            </div>
        </div>
        <div class="posts-grid" id="posts-grid">
            <div class="loading-state">
                <div class="spinner-lg"></div>
                <p>Loading posts…</p>
            </div>
        </div>
    </main>

    <script src="./js/profile.js"></script>
</body>
</html>
